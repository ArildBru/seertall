<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importer ukestall</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
        }

        h1 {
            margin-bottom: 10px;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        input[type="file"] {
            margin-top: 10px;
        }

        #preview {
            white-space: pre-wrap;
            background: #f7f7f7;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #ddd;
            margin-top: 10px;
            font-family: monospace;
            font-size: 14px;
        }

        button {
            padding: 10px 16px;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .primary {
            background: #0070f3;
            color: white;
        }

        .disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>Importer ukestall</h1>
    <p>Last opp en JSON‑fil med ukestall. Filen blir validert og vist før lagring.</p>

    

    
       <!-- Her kommer funksjonaliteten i neste steg -->
   
<div class="section">
  <h2>1. Last opp fil</h2>
  <input type="file" id="fileInput" accept=".json">
</div>

<div class="section">
  <h2>2. Forhåndsvisning</h2>
  <pre id="preview">Ingen fil lastet opp ennå.</pre>
</div>

<div class="section">
  <h2>3. Lagre til /data/</h2>
  <button id="saveBtn" class="primary disabled" disabled>Lagre fil</button>
</div>

 <script>
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const saveBtn = document.getElementById("saveBtn");

fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = (event) => {
        try {
            const json = JSON.parse(event.target.result);
            preview.textContent = JSON.stringify(json, null, 2);

            saveBtn.disabled = false;
            saveBtn.classList.remove("disabled");

        } catch (err) {
            preview.textContent = "Filen er ikke gyldig JSON.";
            saveBtn.disabled = true;
            saveBtn.classList.add("disabled");
        }
    };

    reader.readAsText(file);
});

saveBtn.addEventListener("click", async () => {
    // lagringskoden her
});
</script>
