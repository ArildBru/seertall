<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Importer uke-data</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
      width: 100%;
    }
    #status {
      margin-top: 20px;
      padding: 15px;
      background: #f3f3f3;
      border-radius: 6px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h1>Importer uke-data</h1>

  <label>Uke:</label>
  <input type="number" id="week" placeholder="f.eks. 17" />

  <label>Velg Excel-fil:</label>
  <input type="file" id="fileInput" accept=".xlsx,.xls" />

  <button onclick="uploadFile()">Importer</button>

  <div id="status"></div>

  <script>
    async function uploadFile() {
      const week = document.getElementById("week").value;
      const fileInput = document.getElementById("fileInput");
      const status = document.getElementById("status");

      if (!week) {
        status.textContent = "Du må skrive inn uke.";
        return;
      }
      if (!fileInput.files.length) {
        status.textContent = "Du må velge en Excel-fil.";
        return;
      }

      const file = fileInput.files[0];

      const formData = new FormData();
      formData.append("week", week);
      formData.append("file", file);

      status.textContent = "Laster opp...";

      try {
        const res = await fetch("/api/import-week-file", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        if (!data.ok) {
          status.textContent = "Feil: " + data.error;
          return;
        }

        status.textContent =
          "✔ Importert!\n" +
          "Uke: " + data.week + "\n" +
          "Kanal: " + data.kanal + "\n" +
          "Filnavn: " + data.filename + "\n" +
          "Rader: " + data.rows;

      } catch (err) {
        status.textContent = "Ukjent feil: " + err.message;
      }
    }
  </script>

</body>
</html>
