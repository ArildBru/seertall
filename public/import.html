<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Importer uke-fil</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 40px;
      max-width: 700px;
      margin: 0 auto;
      color: #222;
      background: #fafafa;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    label {
      font-size: 16px;
      font-weight: 500;
      display: block;
      margin-top: 20px;
    }

    .week-input {
      width: 140px;
      padding: 12px;
      font-size: 20px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 10px;
      background: white;
    }

    input[type="file"] {
      margin-top: 12px;
      font-size: 16px;
    }

    button {
      margin-top: 24px;
      padding: 12px 22px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #1a73e8;
      color: white;
      cursor: pointer;
      font-weight: 500;
    }

    button:disabled {
      background: #9bb9e5;
      cursor: default;
    }

    #result {
      margin-top: 30px;
      padding: 20px;
      background: #f2f2f2;
      border-radius: 10px;
      font-size: 18px;
      line-height: 1.5;
      white-space: pre-wrap;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    #loading {
      margin-top: 20px;
      font-style: italic;
      font-size: 16px;
      color: #555;
    }

    @media (max-width: 600px) {
      body { padding: 20px; }
      button { width: 100%; }
      .week-input { width: 100%; }
    }
  </style>
</head>

<body>

<h2>Importer uke-fil</h2>

<label for="week">Uke:</label>
<input type="text" id="week" placeholder="f.eks 16" class="week-input" />

<label for="file">Velg Excel-fil:</label>
<input type="file" id="file" accept=".xlsx" />

<button id="uploadBtn" onclick="uploadFile()">Last opp</button>

<div id="loading"></div>
<div id="result"></div>

<script>
async function uploadFile() {
  const week = document.getElementById("week").value.trim();
  const fileInput = document.getElementById("file");
  const file = fileInput.files[0];

  if (!week) {
    document.getElementById("result").innerText = "Skriv inn ukenummer.";
    return;
  }

  if (!file) {
    document.getElementById("result").innerText = "Velg en fil først.";
    return;
  }

  const button = document.getElementById("uploadBtn");
  button.disabled = true;

  document.getElementById("result").innerText = "";
  document.getElementById("loading").innerText = "Laster opp…";

  const formData = new FormData();
  formData.append("file", file);
  formData.append("week", week);

  const response = await fetch("/api/import-week-file", {
    method: "POST",
    body: formData
  });

  const result = await response.json();

  document.getElementById("loading").innerText = "";
  button.disabled = false;

  if (result.ok) {
    document.getElementById("result").innerText =
      `Filen ble importert.\n\nUke: ${result.week}\nRader: ${result.rows}`;
  } else {
    document.getElementById("result").innerText = "Feil: " + result.error;
  }
}
</script>

</body>
</html>
