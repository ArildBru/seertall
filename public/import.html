<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Importer uke-data</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 20px;
      background: #f7f7f7;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      max-width: 500px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background: #0070f3;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      background: #0059c9;
    }
    #status {
      margin-top: 15px;
      font-size: 15px;
      color: #444;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Importer uke-data</h2>

  <label>Uke:</label>
  <input id="week" type="number" placeholder="f.eks. 17" />

  <label>Velg Excel-fil:</label>
  <input id="file" type="file" accept=".xlsx,.xls" />

  <button onclick="importFile()">Importer</button>

  <div id="status"></div>
</div>

<script>
async function importFile() {
  const week = document.getElementById("week").value;
  const file = document.getElementById("file").files[0];
  const status = document.getElementById("status");

  if (!week || !file) {
    status.textContent = "Du må velge uke og fil.";
    return;
  }

  status.textContent = "Leser Excel…";

  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet);

  status.textContent = "Laster opp…";

  const res = await fetch("/api/import-week-file", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ week, rows })
  });

  const json = await res.json();

  if (!json.ok) {
    status.textContent = "Feil: " + json.error;
  } else {
    status.textContent = `Lagret ${json.rows} rader i ${json.saved}`;
  }
}
</script>

</body>
</html>
