<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Importer seertall</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    body { font-family: Arial, sans-serif; padding: 30px; max-width: 600px; }
    label { font-weight: bold; display: block; margin-top: 15px; }
    input, button { margin-top: 5px; }
    #status { margin-top: 20px; font-weight: bold; }
  </style>
</head>

<body>

<h2>Importer seertall</h2>

<label for="weekInput">Uke:</label>
<input type="number" id="weekInput" min="1" max="53" placeholder="f.eks. 15" />

<label for="fileInput">Velg Excel-fil:</label>
<input type="file" id="fileInput" accept=".xlsx,.xls" />

<button onclick="processFile()">Importer</button>

<div id="status"></div>

<script>
async function processFile() {
  const weekNumber = document.getElementById("weekInput").value;
  const file = document.getElementById("fileInput").files[0];

  if (!weekNumber) {
    document.getElementById("status").innerText = "Du må skrive inn uke.";
    return;
  }

  if (!file) {
    document.getElementById("status").innerText = "Du må velge en Excel-fil.";
    return;
  }

  document.getElementById("status").innerText = "Leser fil...";

  const reader = new FileReader();
  reader.onload = async (e) => {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: "array" });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet);

    if (rows.length === 0) {
      document.getElementById("status").innerText = "Filen inneholder ingen rader.";
      return;
    }

    // NORMALISER ALLE KOLONNENAVN
    const normalizedKeys = Object.fromEntries(
      Object.keys(rows[0]).map(originalKey => [
        originalKey.toLowerCase().trim(), // nøkkel vi søker på
        originalKey // original Excel-kolonnen
      ])
    );

    // Finn riktige kolonner basert på normaliserte navn
    const episodeKey = normalizedKeys["episode"];
    const tittelKey = normalizedKeys["tittel"];
    const lineartKey = normalizedKeys["lineært"] || normalizedKeys["lineart"] || normalizedKeys["linear"];
    const vodKey = normalizedKeys["vod"];
    const totaltKey = normalizedKeys["totalt"];
    const mediehusKey = normalizedKeys["mediehus"];

    if (!episodeKey || !tittelKey || !lineartKey || !vodKey || !totaltKey) {
      document.getElementById("status").innerText =
        "Fant ikke alle nødvendige kolonner (episode, tittel, lineært, VOD, totalt).";
      return;
    }

    // Bygg komplett JSON med ORIGINALKEYS
    const jsonData = rows.map(r => ({
      episode: r[episodeKey],
      tittel: r[tittelKey],
      lineart: r[lineartKey],
      vod: r[vodKey],
      totalt: r[totaltKey],
      seere: r[totaltKey], // hovedtallet AI bruker
      mediehus: mediehusKey ? r[mediehusKey] : null
    }));

    const filename = `uke-${weekNumber}.json`;

    document.getElementById("status").innerText = "Lagrer i Azure...";

    const response = await fetch("/api/save-week-file", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        filename,
        data: jsonData
      })
    });

    const result = await response.json();

    if (result.ok) {
      document.getElementById("status").innerText =
        `Filen ble lagret som ${filename}`;
    } else {
      document.getElementById("status").innerText =
        "Feil ved lagring: " + result.error;
    }
  };

  reader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
