<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Seertall – Analyse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 2rem;
      background: #f9f9f9;
    }
    h1 { margin-bottom: 1rem; }
    label { font-weight: 600; display: block; margin-top: 1rem; }
    input, select, textarea {
      width: 100%;
      max-width: 300px;
      padding: 0.5rem;
      margin-top: 0.25rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #1e4fcf; }
    .card {
      background: white;
      padding: 1.5rem;
      border-radius: 8px;
      margin-top: 2rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
  </style>
</head>

<body>

  <h1>Analyse</h1>

  <!-- Ukevalg -->
  <div class="card">
    <label for="weekInput">Uke</label>
    <input id="weekInput" type="number" min="1" max="53" placeholder="f.eks. 16" />

    <label for="channelSelect">Kanal</label>
    <select id="channelSelect">
      <option value="tv2">TV 2</option>
      <option value="nrk">NRK</option>
      <option value="discovery">Discovery</option>
      <option value="nent">NENT</option>
    </select>

    <button id="loadButton">Last inn uke</button>

    <p id="statusText" style="margin-top:1rem; color:#555;">Ingen data lastet ennå.</p>
  </div>

  <!-- AI -->
  <div class="card">
    <h2>AI-analyse</h2>

    <textarea id="aiQuestion" placeholder="Still et spørsmål om seertallene…" style="height:120px;"></textarea>

    <button id="askAiBtn">Spør AI</button>

    <div id="aiAnswer" style="margin-top:1rem; white-space:pre-wrap; color:#333;"></div>
  </div>

  <script>
    let currentWeekData = null;
    let currentWeek = null;
    let currentChannel = null;

    async function loadWeek(week, channel) {
      const status = document.getElementById("statusText");
      status.textContent = "Laster data…";

      const res = await fetch(`/api/get-week-file?week=${week}&channel=${channel}`);
      if (!res.ok) {
        status.textContent = "Fant ikke data for denne uken.";
        return;
      }

      const data = await res.json();

      currentWeekData = data;
      currentWeek = week;
      currentChannel = channel;

      status.textContent = `Lastet ${data.length} programmer.`;
      console.log("Uke-data:", data);
    }

    document.getElementById("loadButton").addEventListener("click", () => {
      const week = document.getElementById("weekInput").value;
      const channel = document.getElementById("channelSelect").value;
      loadWeek(week, channel);
    });

    // AI
    document.getElementById("askAiBtn").addEventListener("click", async () => {
      const question = document.getElementById("aiQuestion").value;
      const answerBox = document.getElementById("aiAnswer");

      if (!currentWeekData) {
        answerBox.textContent = "Last inn en uke først.";
        return;
      }

      answerBox.textContent = "Analyserer…";

      const response = await fetch("/api/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question,
          week: currentWeek,
          channel: currentChannel,
          data: currentWeekData
        })
      });

      const result = await response.json();
      answerBox.textContent = result.answer || result.error;
    });
  </script>

</body>
</html>
