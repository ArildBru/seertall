<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Analyse – Seertall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      font-weight: 600;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }

    textarea, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #0070f3;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #0059c9;
    }

    pre {
      background: #eee;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
    }
  </style>
</head>

<body>

  <h1>Analyse</h1>

  <div class="card">
    <h2>AI-spørsmål</h2>
    <p id="status">Laster inn alle ukedata…</p>
    <textarea id="question" placeholder="Still et spørsmål om seertallene…"></textarea>
    <button id="askBtn" disabled onclick="askAI()">Spør AI</button>
    <pre id="aiAnswer"></pre>
  </div>

<script>
  window.allData = [];

  async function loadAllData() {
    try {
      const res = await fetch("/api/list-week-files");
      const data = await res.json();

      const files = data.files;
      const all = [];

      for (const filename of files) {
        const resWeek = await fetch(`/api/get-week-file?filename=${filename}`);
        const json = await resWeek.json();
        all.push(...json.rows);
      }

      window.allData = all;

      document.getElementById("status").textContent =
        `Lastet ${all.length} rader fra ${files.length} filer.`;
      document.getElementById("askBtn").disabled = false;

    } catch (err) {
      document.getElementById("status").textContent =
        "Feil ved lasting av data.";
    }
  }

  async function askAI() {
    const question = document.getElementById("question").value;

    const res = await fetch("/api/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        question,
        data: window.allData
      })
    });

    const data = await res.json();
    document.getElementById("aiAnswer").textContent = data.answer;
  }

  loadAllData();
</script>

</body>
</html>
