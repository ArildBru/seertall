<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analyse – Seertall</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-top: 0;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    button {
      background: #0078ff;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:disabled {
      background: #9bbcf5;
      cursor: not-allowed;
    }

    #aiAnswer {
      white-space: pre-wrap;
      margin-top: 15px;
      padding: 15px;
      background: #eee;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h1>Analyse</h1>

  <div class="card">
    <h2>AI-spørsmål</h2>
    <p id="loadStatus">Laster data…</p>

    <input id="questionInput" type="text" placeholder="Skriv et spørsmål…" style="width:100%; padding:10px; margin-bottom:10px;">

    <button id="askBtn" disabled>Spør AI</button>

    <div id="aiAnswer"></div>
  </div>

  <script>
    let allData = [];

    async function loadAllFiles() {
      try {
        const listRes = await fetch("/api/list-week-files");
        const listJson = await listRes.json();

        if (!listJson.ok) {
          document.getElementById("loadStatus").innerText = "Kunne ikke hente fil-liste.";
          return;
        }

        const files = listJson.files || [];
        let loaded = 0;
        let failed = 0;

        for (const f of files) {
          try {
            const r = await fetch("/api/get-week-file?filename=" + f);
            const j = await r.json();

            if (j.ok && Array.isArray(j.rows)) {
              allData.push(...j.rows);
              loaded++;
            } else {
              console.warn("Fil mangler rows:", f, j);
              failed++;
            }
          } catch (err) {
            console.error("Feil ved lasting av fil:", f, err);
            failed++;
          }
        }

        document.getElementById("loadStatus").innerText =
          `Lastet ${loaded} filer (${failed} feilet). Totalt ${allData.length} rader.`;

        document.getElementById("askBtn").disabled = false;

      } catch (err) {
        console.error("Kritisk feil:", err);
        document.getElementById("loadStatus").innerText = "Kritisk feil ved lasting av data.";
      }
    }

    loadAllFiles();

    document.getElementById("askBtn").addEventListener("click", async () => {
      const q = document.getElementById("questionInput").value.trim();
      const out = document.getElementById("aiAnswer");

      if (!q) {
        out.innerText = "Skriv et spørsmål.";
        return;
      }

      out.innerText = "AI tenker…";

      console.log("Sender til AI:", q, allData);

      try {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q, rows: allData })
        });

        const json = await res.json();
        console.log("Svar fra API:", json);

        if (json.ok) {
          out.innerText = json.answer;
        } else {
          out.innerText = "Feil: " + json.error;
        }

      } catch (err) {
        console.error("Fetch-feil:", err);
        out.innerText = "Klarte ikke å kontakte AI.";
      }
    });
  </script>

</body>
</html>
