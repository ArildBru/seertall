<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Seertall – Analyse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 2rem;
      background: #f9f9f9;
    }
    h1 { margin-bottom: 1rem; }
    textarea {
      width: 100%;
      max-width: 600px;
      padding: 0.5rem;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
    }
    .card {
      background: white;
      padding: 1.5rem;
      border-radius: 8px;
      margin-top: 2rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
  </style>
</head>

<body>

  <h1>Analyse</h1>

  <div class="card">
    <p id="statusText">Laster alle ukedata…</p>
  </div>

  <div class="card">
    <h2>AI-analyse</h2>
    <textarea id="aiQuestion" placeholder="Still et spørsmål om seertallene…" style="height:120px;"></textarea>
    <button id="askAiBtn">Spør AI</button>
    <div id="aiAnswer" style="margin-top:1rem; white-space:pre-wrap;"></div>
  </div>

  <script>
    let allData = [];

    async function loadAllWeeks() {
      const status = document.getElementById("statusText");
      status.textContent = "Henter liste over filer…";

      const listRes = await fetch("/api/list-week-files");
      const listJson = await listRes.json();

      if (!listJson.ok) {
        status.textContent = "Kunne ikke hente liste over filer.";
        return;
      }

      const files = listJson.files;
      status.textContent = `Fant ${files.length} filer. Laster inn…`;

      const loaded = [];

      for (const file of files) {
        const res = await fetch(`/api/get-week-file?file=${file}`);
        if (res.ok) {
          const json = await res.json();
          loaded.push({ file, data: json });
        }
      }

      allData = loaded;
      status.textContent = `Lastet ${loaded.length} datasett. Klar for spørsmål.`;
      console.log("ALL DATA:", allData);
    }

    loadAllWeeks();

    document.getElementById("askAiBtn").addEventListener("click", async () => {
      const question = document.getElementById("aiQuestion").value;
      const answerBox = document.getElementById("aiAnswer");

      if (allData.length === 0) {
        answerBox.textContent = "Ingen data lastet ennå.";
        return;
      }

      answerBox.textContent = "Analyserer…";

      const response = await fetch("/api/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question,
          allData
        })
      });

      const result = await response.json();
      answerBox.textContent = result.answer || result.error;
    });
  </script>

</body>
</html>
