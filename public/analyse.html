<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Analyse – Seertall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      font-weight: 600;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }

    select, button, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #0070f3;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #0059c9;
    }

    textarea {
      height: 160px;
      resize: vertical;
    }

    pre {
      background: #eee;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
    }
  </style>
</head>

<body>

  <h1>Analyse</h1>

  <!-- Velg uke -->
  <div class="card">
    <h2>Velg uke</h2>
    <select id="weekSelect"></select>
    <button onclick="loadWeek()">Last inn uke</button>
  </div>

  <!-- Data -->
  <div class="card">
    <h2>Data for uke</h2>
    <pre id="weekData">Ingen data lastet ennå.</pre>
  </div>

  <!-- AI -->
  <div class="card">
    <h2>AI-spørsmål</h2>
    <textarea id="question" placeholder="Still et spørsmål om seertallene..."></textarea>
    <button onclick="askAI()">Spør AI</button>
    <pre id="aiAnswer"></pre>
  </div>

<script>
  // Hent liste over uker fra Azure
  async function loadWeeks() {
    const res = await fetch("/api/list-week-files");
    const data = await res.json();

    const select = document.getElementById("weekSelect");
    select.innerHTML = "";

    data.files
      .map(f => f.replace("uke-", "").replace(".json", ""))
      .sort((a, b) => Number(a) - Number(b))
      .forEach(week => {
        const opt = document.createElement("option");
        opt.value = week;
        opt.textContent = "Uke " + week;
        select.appendChild(opt);
      });
  }

  // Hent én uke
  async function loadWeek() {
    const week = document.getElementById("weekSelect").value;
    const res = await fetch(`/api/get-week-file?week=${week}`);
    const data = await res.json();

    document.getElementById("weekData").textContent =
      JSON.stringify(data.rows, null, 2);
  }

  // AI-spørring
  async function askAI() {
    const question = document.getElementById("question").value;

    const res = await fetch("/api/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question })
    });

    const data = await res.json();
    document.getElementById("aiAnswer").textContent = data.answer;
  }

  loadWeeks();
</script>

</body>
</html>
