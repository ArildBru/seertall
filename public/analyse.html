<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Analyse</title>

  <style>
    body { font-family: Arial, sans-serif; padding: 30px; max-width: 700px; }
    h2 { margin-bottom: 20px; }
    textarea { width: 100%; height: 120px; margin-top: 10px; }
    button { margin-top: 10px; padding: 10px 20px; font-size: 16px; }
    #answer { margin-top: 30px; white-space: pre-wrap; font-size: 18px; }
    #loading { margin-top: 20px; font-style: italic; }
  </style>
</head>

<body>

<h2>Analyse</h2>

<label for="question">Skriv inn et spørsmål:</label>
<textarea id="question" placeholder="f.eks. Hva var VOD for Boksen i uke 16"></textarea>

<button id="askBtn" onclick="askAI()">Spør AI</button>

<div id="loading"></div>
<div id="answer"></div>

<script>
let allData = [];

// 1. Last ALLE data fra Azure
async function loadAllData() {
  const button = document.getElementById("askBtn");
  button.disabled = true;
  button.innerText = "Laster data...";

  document.getElementById("loading").innerText = "Henter liste over filer...";

  const listRes = await fetch("/api/list-week-files");
  const listJson = await listRes.json();

  if (!listJson.ok) {
    document.getElementById("loading").innerText = "Kunne ikke hente liste over filer.";
    return;
  }

  const files = listJson.files;
  const loaded = [];

  document.getElementById("loading").innerText = `Fant ${files.length} filer. Laster...`;

  for (const file of files) {
    const res = await fetch(`/api/get-week-file?filename=${file}`);
    const json = await res.json();

    if (json.ok && Array.isArray(json.data)) {
      loaded.push(...json.data);
    }
  }

  allData = loaded;

  document.getElementById("loading").innerText =
    `Lastet ${allData.length} datapunkter.`;

  button.disabled = false;
  button.innerText = "Spør AI";
}

// 2. Send spørsmål + datasett til AI
async function askAI() {
  const question = document.getElementById("question").value.trim();
  if (!question) return;

  if (allData.length === 0) {
    document.getElementById("answer").innerText =
      "Data lastes fortsatt — vent et øyeblikk og prøv igjen.";
    return;
  }

  document.getElementById("answer").innerText = "";
  document.getElementById("loading").innerText = "Tenker...";

  const response = await fetch("/api/ask", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      question,
      data: allData
    })
  });

  const result = await response.json();

  if (result.ok) {
    document.getElementById("loading").innerText = "";
    document.getElementById("answer").innerText = result.answer;
  } else {
    document.getElementById("loading").innerText = "";
    document.getElementById("answer").innerText = "Feil: " + result.error;
  }
}

// Last data automatisk når siden åpnes
loadAllData();
</script>

</body>
</html>
