<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Seertall.no</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f7f9fc;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #222;
    }

    .loader-box {
      text-align: center;
      animation: fadeIn 0.6s ease forwards;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    p {
      font-size: 16px;
      color: #555;
      margin-bottom: 25px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #d0d7e1;
      border-top-color: #2d6cdf;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <script>
    // Smooth redirect after a short delay
    setTimeout(() => {
      window.location.href = "/analyse.html";
    }, 900);
  </script>
</head>

<body>

  <div class="loader-box">
    <h1>Seertall.no</h1>
    <p>Laster analyse…</p>
    <div class="spinner"></div>
  </div>

</body>
</html>
